hecatomb:
    args:
        reads: "test_data"
        output: "hecatomb.out/"
        search: "fast"
        host: "human"
        trim:
            - host_rm
            - fastp
        combineRuns: false
        simulate: false
        testing: true
        hostFa:
        assembly: "cross"
        longreads: false
        output_paths:
            results: "results/"
            reports: "reports/"
            temp: "temp/"
            log: "logs/"
            bench: "benchmarks/"
            hecatomb_log: "hecatomb.log"
        temp_paths:
            assembly: "assembly/"
            mapping: "mapping/"
            primaryAA: "mmseqs_aa_primary/"
            secondaryAA: "mmseqs_aa_secondary/"
            primaryNT: "mmseqs_nt_primary/"
            secondaryNT: "mmseqs_nt_secondary/"
        databases:
        database_paths:
            contaminants: "contaminants/"
            taxonomy: "taxonomy/"
            tables: "tables/"
            hostBase: "host/"
            primaryAA: "aa/virus_primary_aa/"
            primaryNT: "nt/virus_primary_nt/"
            secondaryAA: "aa/virus_secondary_aa/"
            secondaryNT: "nt/virus_secondary_nt/"
        custom_aa:
        custom_nt:
    container:
        bbmap_bedtools_pigz_flye:
            "oras://quay.io/beardymcjohnface/hecatomb_bbmap_bedtools_pigz_flye:0.0.1"
#            "hecatomb-containers/containers/bbmap_bedtools_pigz_flye.sif"
        canu:
            "oras://quay.io/beardymcjohnface/hecatomb_canu:0.0.1"
#            "hecatomb-containers/containers/canu.sif"
        krona_curl_zstd_pysam:
            "oras://quay.io/beardymcjohnface/hecatomb_krona_curl_zstd_pysam:0.0.1"
#            "hecatomb-containers/containers/krona_curl_zstd_pysam.sif"
        megahit:
            "oras://quay.io/beardymcjohnface/hecatomb_megahit:0.0.1"
#            "hecatomb-containers/containers/megahit.sif"
        minimap2_samtools:
            "oras://quay.io/beardymcjohnface/hecatomb_minimap2_samtools:0.0.1"
#            "hecatomb-containers/containers/minimap2_samtools.sif"
        mmseqs2_seqkit_taxonkit_csvtk:
            "oras://quay.io/beardymcjohnface/hecatomb_mmseqs2_seqkit_taxonkit_csvtk:0.0.1"
#            "hecatomb-containers/containers/mmseqs2_seqkit_taxonkit_csvtk.sif"
    mmseqs:
        linclustParams:
            --kmer-per-seq-scale 0.3
            -c 0.8
            --cov-mode 1
            --min-seq-id 0.97
            --alignment-mode 3
        filtAA:
            --min-length 30
            -e 1e-5
        filtNT:
            --min-length 90
            -e 1e-20
        sensitive:
            --start-sens 2
            --sens-steps 3
            -s 7
        fast:
            -s 4
        taxIdIgnore: 0 1 2 10239 131567 12429 2759      # TaxIDs to defer to topHit rather than LCA
    testdbs:
        - aa/virus_primary_aa_testing/sequenceDB
        - aa/virus_primary_aa_testing/sequenceDB.dbtype
        - aa/virus_primary_aa_testing/sequenceDB_delnodes.dmp
        - aa/virus_primary_aa_testing/sequenceDB_h
        - aa/virus_primary_aa_testing/sequenceDB_h.dbtype
        - aa/virus_primary_aa_testing/sequenceDB_h.index
        - aa/virus_primary_aa_testing/sequenceDB.index
        - aa/virus_primary_aa_testing/sequenceDB.lookup
        - aa/virus_primary_aa_testing/sequenceDB_mapping
        - aa/virus_primary_aa_testing/sequenceDB_merged.dmp
        - aa/virus_primary_aa_testing/sequenceDB_names.dmp
        - aa/virus_primary_aa_testing/sequenceDB_nodes.dmp
        - aa/virus_primary_aa_testing/sequenceDB.source
        - aa/virus_secondary_aa_testing/sequenceDB
        - aa/virus_secondary_aa_testing/sequenceDB.dbtype
        - aa/virus_secondary_aa_testing/sequenceDB_delnodes.dmp
        - aa/virus_secondary_aa_testing/sequenceDB_h
        - aa/virus_secondary_aa_testing/sequenceDB_h.dbtype
        - aa/virus_secondary_aa_testing/sequenceDB_h.index
        - aa/virus_secondary_aa_testing/sequenceDB.index
        - aa/virus_secondary_aa_testing/sequenceDB.lookup
        - aa/virus_secondary_aa_testing/sequenceDB_mapping
        - aa/virus_secondary_aa_testing/sequenceDB_merged.dmp
        - aa/virus_secondary_aa_testing/sequenceDB_names.dmp
        - aa/virus_secondary_aa_testing/sequenceDB_nodes.dmp
        - aa/virus_secondary_aa_testing/sequenceDB.source
        - nt/virus_primary_nt_testing/sequenceDB
        - nt/virus_primary_nt_testing/sequenceDB.dbtype
        - nt/virus_primary_nt_testing/sequenceDB_h
        - nt/virus_primary_nt_testing/sequenceDB_h.dbtype
        - nt/virus_primary_nt_testing/sequenceDB_h.index
        - nt/virus_primary_nt_testing/sequenceDB.index
