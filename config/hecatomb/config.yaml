    dbtax:
        url:
            "https://ftp.ncbi.nlm.nih.gov/pub/taxonomy/taxdump.tar.gz"
        md5:
            "https://ftp.ncbi.nlm.nih.gov/pub/taxonomy/taxdump.tar.gz.md5"
        tar:
            "taxdump.tar.gz"
        files:
            - taxonomy/citations.dmp
            - taxonomy/delnodes.dmp
            - taxonomy/division.dmp
            - taxonomy/gc.prt
            - taxonomy/gencode.dmp
            - taxonomy/merged.dmp
