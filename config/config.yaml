# Directories
databaseDirectory: Database
inputFastQDirectory: Data/Raw_FastQ  # user can override
rawFastQDirectory: Data/Raw_FastQ
trimmedFastQDirectory: Data/FastP
nohumanDirectory: Data/NoHuman
metaphlanDirectory: Data/Metaphlan
singlemDirectory: Data/SingleM
kraken2Directory: Data/Kraken2
multiQCDirectory: Reports/MultiQC
qcOutputDirectory: Reports/FastQC
metaspadesDirectory: Data/MetaSPAdes
humannDirectory: Data/HUMAnN
mlpDirectory: Data/MLP
rgiDirectory: Data/RGI
antismashDirectory: Data/AntiSMASH
logDirectory: logs
slurmLogDirectory: logs/slurm
strainphlanDirectory: "Data/StrainPhlAn"
prodigalGVDirectory: "Data/ProdigalGV"
genomadDirectory: "Data/geNomad"

# Flags
test_mode: false
download_sra: false
metaphlan: true
singlem: true
kraken2: false
metaspades: false
mlp: false
humann: false 
rgi: false
antismash: false
strainphlan: false
strainphlan_species: []
prodigal_gv: false
genomad: false

# Thread allocations for each tool (users can customize these)
threads:
  fastp: 10
  nohuman: 8
  fastqc: 8
  metaphlan: 8
  singlem: 10
  kraken2: 8
  humann: 10
  metaspades: 12
  rgi: 10
  antismash: 16
  genomad: 8

# ==============================================================================
# Tool parameters — edit these to customise tool behaviour
# ==============================================================================
params:
    # Bracken
  bracken:
    read_length: 150           # -r, sequencing read length
    level: "S"                 # -l, S=species, G=genus, F=family

  # AntiSMASH
  antismash:
    taxon: "bacteria"          # bacteria or fungi
    genefinding_tool: "prodigal-m"  # prodigal, prodigal-m, glimmerhmm, none

  # RGI
  rgi:
    alignment_tool: "DIAMOND"  # DIAMOND or BLAST
    include_loose: false       # --include_loose

  genomad:
    splits: 8           # split MMseqs2 search to reduce memory usage
    min_score: 0.7      # minimum classification confidence score (0–1)
    min_plasmid_size: 1000  # minimum plasmid contig length (bp)
    min_virus_size: 1000    # minimum virus contig length (bp)

  # ============================================================================
# Container Configuration for Singularity (E.g. Pawsey Setonix)
# ============================================================================
#
# Set use_containers: true to use Singularity containers instead of conda.
# Point each tool to the .sif file on /software/.
#
# Replace <project> and <user> with your actual project ID and username (if applicable).
# ============================================================================

use_containers: true

containers:
  fastp:      "oras://quay.io/yenkai_chen_id/opustaxa_fastp:0.0.0"
  fastqc:     "oras://quay.io/yenkai_chen_id/opustaxa_fastqc:0.0.0"
  multiqc:    "oras://quay.io/yenkai_chen_id/opustaxa_multiqc:0.0.0"
  singlem:    "oras://quay.io/yenkai_chen_id/opustaxa_singlem:0.0.0"
  sra:        "oras://quay.io/yenkai_chen_id/opustaxa_sra:0.0.0"
  metaspades: "oras://quay.io/yenkai_chen_id/opustaxa_metaspades:0.0.0"
  rgi:        "oras://quay.io/yenkai_chen_id/opustaxa_rgi:0.0.0"
  antismash:  "oras://quay.io/yenkai_chen_id/opustaxa_antismash:0.0.0"
  mlp:        "oras://quay.io/yenkai_chen_id/opustaxa_mlp:0.0.0"
  nohuman:    "oras://quay.io/yenkai_chen_id/opustaxa_nohuman:0.0.0"
  metaphlan:  "oras://quay.io/yenkai_chen_id/opustaxa_metaphlan:0.0.0"
  kraken2:    "oras://quay.io/yenkai_chen_id/opustaxa_kraken2:0.0.0"
  humann:     "oras://quay.io/yenkai_chen_id/opustaxa_humann:0.0.0"
  prodigal_gv: "/software/projects/<project>/<user>/containers/prodigal-gv.sif"
  genomad: "/software/projects/<project>/<user>/containers/genomad.sif"