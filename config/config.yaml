# Directories
databaseDirectory: Database
inputFastQDirectory: Data/Raw_FastQ  # user can override
rawFastQDirectory: Data/Raw_FastQ
trimmedFastQDirectory: Data/FastP
nohumanDirectory: Data/NoHuman
metaphlanDirectory: Data/Metaphlan
singlemDirectory: Data/SingleM
kraken2Directory: Data/Kraken2
multiQCDirectory: Reports/MultiQC
qcOutputDirectory: Reports/FastQC
metaspadesDirectory: Data/MetaSPAdes
humannDirectory: Data/HUMAnN
mlpDirectory: Data/MLP
rgiDirectory: Data/RGI
antismashDirectory: Data/AntiSMASH
logDirectory: logs
slurmLogDirectory: logs/slurm
strainphlanDirectory: "Data/StrainPhlAn"
prodigalGVDirectory: "Data/ProdigalGV"

# Flags
test_mode: false
download_sra: false
metaphlan: true
singlem: true
kraken2: false
metaspades: false
mlp: false
humann: false 
rgi: false
antismash: false
strainphlan: false
strainphlan_species: []
prodigal_gv: false  # Enable with --config prodigal_gv=true

# Thread allocations for each tool (users can customize these)
threads:
  fastp: 10
  nohuman: 8
  fastqc: 8
  metaphlan: 8
  singlem: 10
  kraken2: 8
  humann: 10
  metaspades: 12
  rgi: 10
  antismash: 16

# ==============================================================================
# Tool parameters — edit these to customise tool behaviour
# ==============================================================================
params:
  # FastP quality trimming
  fastp:
    quality_threshold: 20      # -q, minimum quality
    min_length: 50             # -l, minimum read length
    adapter_trimming: true     # --detect_adapter_for_pe

  # MetaSPAdes assembly
  metaspades:
    kmer_sizes: "21,33,55,77"  # -k, comma-separated k-mer sizes
    only_assembler: false      # --only-assembler (skip error correction)

  # Kraken2 / Bracken
  kraken2:
    confidence: 0.0            # --confidence, 0.0-1.0
  bracken:
    read_length: 150           # -r, sequencing read length
    level: "S"                 # -l, S=species, G=genus, F=family
    threshold: 10              # -t, minimum reads required

  # AntiSMASH
  antismash:
    min_contig_len: 1000       # filter contigs below this length
    taxon: "bacteria"          # bacteria or fungi
    genefinding_tool: "prodigal-m"  # prodigal, prodigal-m, glimmerhmm, none

  # RGI
  rgi:
    alignment_tool: "DIAMOND"  # DIAMOND or BLAST
    include_loose: false       # --include_loose

  # Prodigal-GV
  prodigal_gv:
    output_format: "gff"       # gff, gbk, sco

  # HUMAnN
  humann:
    memory_use: "maximum"      # minimum, maximum
    bypass_nucleotide_search: true

  # ============================================================================
# Container Configuration for Singularity (E.g. Pawsey Setonix)
# ============================================================================
#
# Set use_containers: true to use Singularity containers instead of conda.
# Point each tool to the .sif file on /software/.
#
# Replace <project> and <user> with your actual project ID and username (if applicable).
# ============================================================================

use_containers: true

containers:
  fastp:      "/software/projects/<project>/<user>/containers/fastp.sif"
  nohuman:    "/software/projects/<project>/<user>/containers/nohuman.sif"
  fastqc:     "/software/projects/<project>/<user>/containers/fastqc.sif"
  multiqc:    "/software/projects/<project>/<user>/containers/multiqc.sif"
  metaphlan:  "/software/projects/<project>/<user>/containers/metaphlan.sif"
  singlem:    "/software/projects/<project>/<user>/containers/singlem.sif"
  kraken2:    "/software/projects/<project>/<user>/containers/kraken2.sif"
  humann:     "/software/projects/<project>/<user>/containers/humann.sif"
  sra:        "/software/projects/<project>/<user>/containers/sra.sif"
  metaspades: "/software/projects/<project>/<user>/containers/metaspades.sif"
  rgi:        "/software/projects/<project>/<user>/containers/rgi.sif"
  antismash:  "/software/projects/<project>/<user>/containers/antismash.sif"
  mlp:        "/software/projects/<project>/<user>/containers/mlp.sif"
  prodigal_gv: "/software/projects/<project>/<user>/containers/prodigal-gv.sif"