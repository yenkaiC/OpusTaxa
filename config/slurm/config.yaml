# Executor settings
executor: slurm
jobs: 50

# Default resources for all jobs
default-resources:
  mem_mb: 24000 # 24 GigaBytes
  runtime: 480 # minutes (8 hours)
  #slurm_partition: general #adjust as required

# Limit heavy jobs
set-resources:
  - "remove_human_reads:jobs=20"
  - "metaphlan:jobs=15"
  - "singlem:jobs=15"
  - "metaspades:jobs=5"
  #- "metaspades:runtime=2880"           # 48 hours - adjust as required
  #- "metaspades:slurm_partition=long"   # Use long partition for assembly - adjust partition as requried
  - "humann:jobs=8"        
  - "antismash:jobs=5"
  #- "antismash:runtime=1400"
  - "rgi:jobs=7"

# Job naming - includes rule and sample info
jobname: "OpusTaxa.{rulename}.{jobid}"

# Workflow settings
rerun-incomplete: true
restart-times: 3
use-conda: true